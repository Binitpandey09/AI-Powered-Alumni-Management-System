services:
  - type: web
    name: alumniai-web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn --config gunicorn.conf.py alumni_platform.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: alumni_platform.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: alumniai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: alumniai-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.8.10"
    healthCheckPath: /api/health/

  - type: worker
    name: alumniai-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A alumni_platform worker --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: alumni_platform.settings.prod
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: alumniai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: alumniai-redis
          type: redis
          property: connectionString

  - type: worker
    name: alumniai-celery-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A alumni_platform beat --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: alumni_platform.settings.prod
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: alumniai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: alumniai-redis
          type: redis
          property: connectionString

databases:
  - name: alumniai-db
    databaseName: alumniai_db
    user: alumniai_user
    plan: free

  - name: alumniai-redis
    type: redis
    plan: free
