{% extends "admin_panel/base_admin.html" %}
{% block title %}Alumni Verification{% endblock %}
{% block page_title %}Alumni Verification{% endblock %}
{% block nav_verification %}active{% endblock %}

{% block content %}
<!-- Tabs -->
<div style="display:flex; gap:8px; margin-bottom:20px;">
  <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">Pending</button>
  <button class="tab-btn" id="tab-verified" onclick="switchTab('verified')">Verified</button>
  <button class="tab-btn" id="tab-rejected" onclick="switchTab('rejected')">Rejected</button>
</div>

<div id="verification-list">
  <div style="padding:40px; text-align:center; color:#94A3B8;">Loading…</div>
</div>

<!-- Action modal -->
<div id="verify-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3 style="font-size:16px; font-weight:700; color:#0F172A; margin-bottom:4px;" id="vm-title">Verify Alumni</h3>
    <p style="font-size:13px; color:#64748B; margin-bottom:16px;" id="vm-subtitle"></p>
    <textarea id="vm-note" placeholder="Note / rejection reason…" style="width:100%; height:80px; resize:none; margin-bottom:16px;"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn-ghost" onclick="closeVerifyModal()">Cancel</button>
      <button id="vm-btn" class="btn-primary" onclick="submitVerify()">Confirm</button>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
let currentTab = 'pending';
let pendingAlumniId = null;
let pendingVerifyAction = null;

function switchTab(tab) {
  currentTab = tab;
  ['pending','verified','rejected'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  loadVerification();
}

async function loadVerification() {
  document.getElementById('verification-list').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">Loading…</div>';
  const r = await apiGet(`/api/dashboard/admin/alumni/verification/?status=${currentTab}`);
  if (!r.ok) { showToast('Failed to load', 'error'); return; }
  const alumni = r.data.alumni || [];

  if (!alumni.length) {
    document.getElementById('verification-list').innerHTML = `<div style="padding:40px;text-align:center;color:#94A3B8;">No ${currentTab} alumni.</div>`;
    return;
  }

  let html = '<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px;">';
  for (const a of alumni) {
    const pic = a.profile_pic
      ? `<img src="${a.profile_pic}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;" />`
      : `<div style="width:48px;height:48px;border-radius:50%;background:#2563EB;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;">${(a.name||'?').charAt(0)}</div>`;

    const statusColor = { pending: '#F59E0B', verified: '#22C55E', rejected: '#EF4444' }[a.verification_status] || '#64748B';

    html += `<div style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:20px;">
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;">
        ${pic}
        <div style="flex:1;">
          <div style="font-weight:700;color:#0F172A;font-size:15px;">${a.name || '—'}</div>
          <div style="font-size:12px;color:#64748B;">${a.email}</div>
          <div style="font-size:12px;color:#475569;margin-top:2px;">${a.designation || ''} ${a.company ? '@ ' + a.company : ''}</div>
        </div>
        <span style="background:${statusColor}22;color:${statusColor};font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;">${a.verification_status}</span>
      </div>
      ${a.verification_note ? `<div style="background:#F8FAFC;border-radius:8px;padding:10px;font-size:13px;color:#475569;margin-bottom:12px;">${a.verification_note}</div>` : ''}
      ${a.verification_document_url ? `<a href="${a.verification_document_url}" target="_blank" style="font-size:13px;color:#2563EB;display:block;margin-bottom:12px;">📎 View Document</a>` : '<div style="font-size:13px;color:#94A3B8;margin-bottom:12px;">No document uploaded</div>'}
      <div style="font-size:12px;color:#94A3B8;margin-bottom:14px;">Joined ${fmtDate(a.joined)}</div>
      ${currentTab === 'pending' ? `
      <div style="display:flex;gap:8px;">
        <button class="btn-success" style="flex:1;" onclick="openVerifyModal(${a.alumni_id},'approve','Approve ${a.name}','Approve this alumni profile?')">✓ Approve</button>
        <button class="btn-danger" style="flex:1;" onclick="openVerifyModal(${a.alumni_id},'reject','Reject ${a.name}','Provide a rejection reason:')">✗ Reject</button>
      </div>` : ''}
    </div>`;
  }
  html += '</div>';
  document.getElementById('verification-list').innerHTML = html;
}

function openVerifyModal(alumniId, action, title, subtitle) {
  pendingAlumniId = alumniId;
  pendingVerifyAction = action;
  setEl('vm-title', title);
  setEl('vm-subtitle', subtitle);
  document.getElementById('vm-note').value = '';
  const btn = document.getElementById('vm-btn');
  btn.className = action === 'approve' ? 'btn-success' : 'btn-danger';
  btn.textContent = action === 'approve' ? 'Approve' : 'Reject';
  document.getElementById('verify-modal').style.display = 'flex';
}

function closeVerifyModal() {
  document.getElementById('verify-modal').style.display = 'none';
}

async function submitVerify() {
  if (!pendingAlumniId || !pendingVerifyAction) return;
  const note = document.getElementById('vm-note').value.trim();
  if (pendingVerifyAction === 'reject' && !note) { showToast('Rejection reason is required', 'error'); return; }
  const r = await apiPost(`/api/dashboard/admin/alumni/verification/${pendingAlumniId}/`, { action: pendingVerifyAction, note });
  if (r.ok) {
    showToast(`Alumni ${pendingVerifyAction}d successfully`, 'success');
    closeVerifyModal();
    loadVerification();
  } else {
    showToast(r.data?.error || 'Action failed', 'error');
  }
}

loadVerification();
</script>
{% endblock %}
