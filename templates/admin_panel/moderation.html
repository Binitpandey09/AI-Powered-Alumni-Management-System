{% extends "admin_panel/base_admin.html" %}
{% block title %}Moderation{% endblock %}
{% block page_title %}Content Moderation{% endblock %}
{% block nav_moderation %}active{% endblock %}

{% block content %}
<div style="display:flex; gap:8px; margin-bottom:20px;">
  <button class="tab-btn active" id="tab-posts" onclick="switchTab('posts')">Flagged Posts</button>
  <button class="tab-btn" id="tab-referrals" onclick="switchTab('referrals')">Referrals</button>
</div>

<div id="mod-list">
  <div style="padding:40px; text-align:center; color:#94A3B8;">Loading…</div>
</div>

<!-- Action modal -->
<div id="mod-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3 style="font-size:16px; font-weight:700; color:#0F172A; margin-bottom:4px;" id="mm-title">Moderate Content</h3>
    <p style="font-size:13px; color:#64748B; margin-bottom:16px;" id="mm-subtitle"></p>
    <textarea id="mm-note" placeholder="Admin note (optional)" style="width:100%; height:70px; resize:none; margin-bottom:16px;"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn-ghost" onclick="closeModModal()">Cancel</button>
      <button id="mm-btn" class="btn-primary" onclick="submitMod()">Confirm</button>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
let currentTab = 'posts';
let pendingModAction = null;
let pendingModType = null;
let pendingModId = null;

function switchTab(tab) {
  currentTab = tab;
  ['posts','referrals'].forEach(t => document.getElementById('tab-' + t).classList.toggle('active', t === tab));
  loadModeration();
}

async function loadModeration() {
  document.getElementById('mod-list').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">Loading…</div>';
  const r = await apiGet(`/api/dashboard/admin/moderation-api/?type=${currentTab}`);
  if (!r.ok) { showToast('Failed to load', 'error'); return; }

  if (currentTab === 'posts') renderPosts(r.data.flagged_posts || []);
  else renderReferrals(r.data.flagged_referrals || []);
}

function renderPosts(posts) {
  if (!posts.length) { document.getElementById('mod-list').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">No flagged posts.</div>'; return; }
  let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
  for (const p of posts) {
    const statusColor = p.status === 'flagged' ? '#EF4444' : '#22C55E';
    html += `<div style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;">
        <div>
          <div style="font-weight:600;color:#0F172A;">${p.author_name} <span style="font-size:12px;color:#64748B;">(${p.author_email})</span></div>
          <div style="font-size:12px;color:#94A3B8;margin-top:2px;">${fmtDate(p.created_at)} · ${p.post_type}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="background:#FEE2E2;color:#991B1B;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;">🚩 ${p.flagged_count} flags</span>
          <span style="background:${statusColor}22;color:${statusColor};font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;">${p.status}</span>
        </div>
      </div>
      <div style="background:#F8FAFC;border-radius:8px;padding:12px;font-size:14px;color:#475569;margin-bottom:14px;line-height:1.5;">${p.content_preview}</div>
      <div style="display:flex;gap:8px;">
        <button class="btn-success" onclick="openModModal('post',${p.id},'approve','Approve Post','Clear flags and mark post as active?')">✓ Approve</button>
        <button class="btn-warning" onclick="openModModal('post',${p.id},'hide','Hide Post','Hide this post from the feed?')">Hide</button>
        <button class="btn-danger" onclick="openModModal('post',${p.id},'delete','Delete Post','Permanently delete this post?')">Delete</button>
      </div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('mod-list').innerHTML = html;
}

function renderReferrals(referrals) {
  if (!referrals.length) { document.getElementById('mod-list').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">No referrals to review.</div>'; return; }
  let html = '<div class="table-wrap"><table><thead><tr><th>Job Title</th><th>Company</th><th>Posted By</th><th>Applications</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
  for (const r of referrals) {
    html += `<tr>
      <td style="font-weight:600;">${r.job_title}</td>
      <td>${r.company_name}</td>
      <td style="font-size:13px;color:#64748B;">${r.posted_by}</td>
      <td>${r.total_applications}</td>
      <td><span class="badge-role badge-${r.status === 'active' ? 'active' : 'inactive'}">${r.status}</span></td>
      <td><button class="btn-danger" onclick="openModModal('referral',${r.id},'deactivate','Deactivate Referral','Deactivate this referral posting?')">Deactivate</button></td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  document.getElementById('mod-list').innerHTML = html;
}

function openModModal(type, id, action, title, subtitle) {
  pendingModType = type; pendingModId = id; pendingModAction = action;
  setEl('mm-title', title); setEl('mm-subtitle', subtitle);
  document.getElementById('mm-note').value = '';
  const btn = document.getElementById('mm-btn');
  btn.className = action === 'approve' ? 'btn-success' : action === 'hide' ? 'btn-warning' : 'btn-danger';
  btn.textContent = 'Confirm';
  document.getElementById('mod-modal').style.display = 'flex';
}

function closeModModal() { document.getElementById('mod-modal').style.display = 'none'; }

async function submitMod() {
  const note = document.getElementById('mm-note').value.trim();
  const r = await apiPost('/api/dashboard/admin/moderation-api/', {
    content_type: pendingModType, object_id: pendingModId, action: pendingModAction, note
  });
  if (r.ok) { showToast('Action completed', 'success'); closeModModal(); loadModeration(); }
  else showToast(r.data?.error || 'Failed', 'error');
}

loadModeration();
</script>
{% endblock %}
