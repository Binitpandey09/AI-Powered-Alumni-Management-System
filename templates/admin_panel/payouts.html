{% extends "admin_panel/base_admin.html" %}
{% block title %}Payouts{% endblock %}
{% block page_title %}Payout Management{% endblock %}
{% block nav_payouts %}active{% endblock %}

{% block content %}
<div style="display:flex;gap:8px;margin-bottom:20px;">
  <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">Pending</button>
  <button class="tab-btn" id="tab-approved" onclick="switchTab('approved')">Approved</button>
  <button class="tab-btn" id="tab-processed" onclick="switchTab('processed')">Processed</button>
  <button class="tab-btn" id="tab-rejected" onclick="switchTab('rejected')">Rejected</button>
</div>

<div id="payouts-list">
  <div style="padding:40px;text-align:center;color:#94A3B8;">Loading…</div>
</div>

<div id="payout-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3 style="font-size:16px;font-weight:700;color:#0F172A;margin-bottom:4px;" id="pm-title">Payout Action</h3>
    <p style="font-size:13px;color:#64748B;margin-bottom:16px;" id="pm-subtitle"></p>
    <textarea id="pm-note" placeholder="Note (optional)" style="width:100%;height:70px;resize:none;margin-bottom:16px;"></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn-ghost" onclick="document.getElementById('payout-modal').style.display='none'">Cancel</button>
      <button id="pm-btn" class="btn-primary" onclick="submitPayout()">Confirm</button>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
let currentTab = 'pending';
let pendingPayoutId = null;
let pendingPayoutAction = null;

function switchTab(tab) {
  currentTab = tab;
  ['pending','approved','processed','rejected'].forEach(t => document.getElementById('tab-' + t).classList.toggle('active', t === tab));
  loadPayouts();
}

async function loadPayouts() {
  document.getElementById('payouts-list').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">Loading…</div>';
  const r = await apiGet(`/api/payments/admin/payouts/?status=${currentTab}`);
  if (!r.ok) {
    document.getElementById('payouts-list').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">No payout data available.</div>';
    return;
  }
  const payouts = r.data.results || r.data || [];
  if (!payouts.length) {
    document.getElementById('payouts-list').innerHTML = `<div style="padding:40px;text-align:center;color:#94A3B8;">No ${currentTab} payouts.</div>`;
    return;
  }

  let html = '<div style="display:flex;flex-direction:column;gap:12px;">';
  for (const p of payouts) {
    html += `<div style="background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;">
        <div>
          <div style="font-weight:700;color:#0F172A;font-size:15px;">${p.user_name || p.user || '—'}</div>
          <div style="font-size:12px;color:#64748B;">${p.user_email || ''}</div>
          <div style="font-size:12px;color:#475569;margin-top:4px;">Bank: ${p.bank_name || '—'} · A/C: ${p.account_number ? '****' + String(p.account_number).slice(-4) : '—'}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:22px;font-weight:800;color:#22C55E;">${fmtRs(p.amount)}</div>
          <div style="font-size:12px;color:#94A3B8;">${fmtDate(p.created_at)}</div>
        </div>
      </div>
      ${p.note ? `<div style="background:#F8FAFC;border-radius:8px;padding:10px;font-size:13px;color:#475569;margin-bottom:12px;">${p.note}</div>` : ''}
      <div style="display:flex;gap:8px;">
        ${currentTab === 'pending' ? `
          <button class="btn-success" onclick="openPayoutModal(${p.id},'approve','Approve Payout','Approve ₹${p.amount} payout?')">Approve</button>
          <button class="btn-danger" onclick="openPayoutModal(${p.id},'reject','Reject Payout','Reject this payout request?')">Reject</button>
        ` : ''}
        ${currentTab === 'approved' ? `
          <button class="btn-primary" onclick="openPayoutModal(${p.id},'process','Mark as Processed','Mark this payout as processed/transferred?')">Mark Processed</button>
          <button class="btn-danger" onclick="openPayoutModal(${p.id},'reject','Reject Payout','Reject this payout?')">Reject</button>
        ` : ''}
      </div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('payouts-list').innerHTML = html;
}

function openPayoutModal(id, action, title, subtitle) {
  pendingPayoutId = id; pendingPayoutAction = action;
  setEl('pm-title', title); setEl('pm-subtitle', subtitle);
  document.getElementById('pm-note').value = '';
  const btn = document.getElementById('pm-btn');
  btn.className = action === 'approve' || action === 'process' ? 'btn-success' : 'btn-danger';
  btn.textContent = 'Confirm';
  document.getElementById('payout-modal').style.display = 'flex';
}

async function submitPayout() {
  const note = document.getElementById('pm-note').value.trim();
  const r = await apiPost(`/api/payments/admin/payouts/${pendingPayoutId}/action/`, { action: pendingPayoutAction, note });
  if (r.ok) { showToast('Payout action completed', 'success'); document.getElementById('payout-modal').style.display = 'none'; loadPayouts(); }
  else showToast(r.data?.error || 'Failed', 'error');
}

loadPayouts();
</script>
{% endblock %}
