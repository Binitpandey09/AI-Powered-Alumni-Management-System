{% extends "admin_panel/base_admin.html" %}
{% block title %}Users{% endblock %}
{% block page_title %}User Management{% endblock %}
{% block nav_users %}active{% endblock %}

{% block content %}
<!-- Filters -->
<div style="background:#fff; border:1px solid #E2E8F0; border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; gap:12px; flex-wrap:wrap; align-items:center;">
  <input type="search" id="search-input" placeholder="Search by name, email, college…" style="flex:1; min-width:200px;" oninput="debounceSearch()" />
  <select id="filter-role" onchange="loadUsers()">
    <option value="">All Roles</option>
    <option value="student">Student</option>
    <option value="alumni">Alumni</option>
    <option value="faculty">Faculty</option>
  </select>
  <select id="filter-status" onchange="loadUsers()">
    <option value="">All Status</option>
    <option value="active">Active</option>
    <option value="suspended">Suspended</option>
    <option value="inactive">Inactive</option>
  </select>
  <select id="filter-verified" onchange="loadUsers()">
    <option value="">Any Verification</option>
    <option value="true">Verified</option>
    <option value="false">Unverified</option>
  </select>
  <button class="btn-primary" onclick="loadUsers()">Search</button>
</div>

<!-- Table -->
<div class="table-wrap">
  <div style="padding:16px 20px; border-bottom:1px solid #E2E8F0; display:flex; align-items:center; justify-content:space-between;">
    <span style="font-size:14px; font-weight:600; color:#0F172A;">Users <span id="user-count" style="color:#64748B; font-weight:400;"></span></span>
  </div>
  <div id="users-table-body">
    <div style="padding:40px; text-align:center; color:#94A3B8;">Loading…</div>
  </div>
  <!-- Pagination -->
  <div style="padding:14px 20px; border-top:1px solid #E2E8F0; display:flex; align-items:center; justify-content:space-between;">
    <button class="btn-ghost" id="btn-prev" onclick="changePage(-1)" disabled>← Prev</button>
    <span style="font-size:13px; color:#64748B;" id="page-info">Page 1</span>
    <button class="btn-ghost" id="btn-next" onclick="changePage(1)">Next →</button>
  </div>
</div>

<!-- Action modal -->
<div id="action-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3 style="font-size:16px; font-weight:700; color:#0F172A; margin-bottom:4px;" id="modal-title">Action</h3>
    <p style="font-size:13px; color:#64748B; margin-bottom:16px;" id="modal-subtitle"></p>
    <textarea id="modal-note" placeholder="Reason / note (optional)" style="width:100%; height:80px; resize:none; margin-bottom:16px;"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end;">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button id="modal-confirm-btn" class="btn-primary" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
let currentPage = 1;
let nextUrl = null;
let prevUrl = null;
let pendingAction = null;
let pendingUserId = null;

const searchDebounce = (() => {
  let t;
  return () => { clearTimeout(t); t = setTimeout(loadUsers, 400); };
})();
function debounceSearch() { searchDebounce(); }

async function loadUsers(page = 1) {
  currentPage = page;
  const search = document.getElementById('search-input').value.trim();
  const role = document.getElementById('filter-role').value;
  const status = document.getElementById('filter-status').value;
  const verified = document.getElementById('filter-verified').value;

  let url = `/api/dashboard/admin/users/?page=${page}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  if (role) url += `&role=${role}`;
  if (status === 'suspended') url += `&is_suspended=true`;
  else if (status === 'active') url += `&is_active=true`;
  else if (status === 'inactive') url += `&is_active=false`;
  if (verified) url += `&is_verified=${verified}`;

  document.getElementById('users-table-body').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">Loading…</div>';
  const r = await apiGet(url);
  if (!r.ok) { showToast('Failed to load users', 'error'); return; }

  const { count, next, previous, results } = r.data;
  nextUrl = next; prevUrl = previous;
  setEl('user-count', `(${count} total)`);
  setEl('page-info', `Page ${currentPage}`);
  document.getElementById('btn-prev').disabled = !previous;
  document.getElementById('btn-next').disabled = !next;

  if (!results.length) {
    document.getElementById('users-table-body').innerHTML = '<div style="padding:40px;text-align:center;color:#94A3B8;">No users found.</div>';
    return;
  }

  let html = `<table><thead><tr>
    <th>User</th><th>Role</th><th>College</th><th>Status</th><th>Joined</th><th>Actions</th>
  </tr></thead><tbody>`;

  for (const u of results) {
    const name = `${u.first_name} ${u.last_name}`.trim() || u.email;
    const roleBadge = `<span class="badge-role badge-${u.role}">${u.role}</span>`;
    let statusBadge = u.is_suspended
      ? '<span class="badge-role badge-suspended">Suspended</span>'
      : u.is_active
        ? '<span class="badge-role badge-active">Active</span>'
        : '<span class="badge-role badge-inactive">Inactive</span>';
    if (u.is_verified) statusBadge += ' <span class="badge-role badge-verified" style="font-size:11px;">✓ Verified</span>';

    html += `<tr>
      <td>
        <div style="font-weight:600;color:#0F172A;">${name}</div>
        <div style="font-size:12px;color:#64748B;">${u.email}</div>
      </td>
      <td>${roleBadge}</td>
      <td style="font-size:13px;color:#475569;">${u.college || '—'}</td>
      <td>${statusBadge}</td>
      <td style="font-size:13px;color:#64748B;">${fmtDate(u.date_joined)}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${!u.is_verified ? `<button class="btn-ghost" style="font-size:12px;padding:4px 10px;" onclick="openModal(${u.id},'verify','Verify User','Mark ${name} as verified?')">Verify</button>` : ''}
          ${!u.is_suspended && u.is_active ? `<button class="btn-warning" style="font-size:12px;padding:4px 10px;" onclick="openModal(${u.id},'suspend','Suspend User','Suspend ${name}? They will lose access.')">Suspend</button>` : ''}
          ${u.is_suspended ? `<button class="btn-success" style="font-size:12px;padding:4px 10px;" onclick="openModal(${u.id},'unsuspend','Unsuspend User','Restore access for ${name}?')">Unsuspend</button>` : ''}
          ${u.is_active ? `<button class="btn-danger" style="font-size:12px;padding:4px 10px;" onclick="openModal(${u.id},'delete','Deactivate User','Deactivate ${name}? They will not be able to log in.')">Deactivate</button>` : `<button class="btn-ghost" style="font-size:12px;padding:4px 10px;" onclick="openModal(${u.id},'restore','Restore User','Restore ${name}?')">Restore</button>`}
        </div>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('users-table-body').innerHTML = html;
}

function changePage(dir) {
  loadUsers(currentPage + dir);
}

function openModal(userId, action, title, subtitle) {
  pendingUserId = userId;
  pendingAction = action;
  setEl('modal-title', title);
  setEl('modal-subtitle', subtitle);
  document.getElementById('modal-note').value = '';
  const btn = document.getElementById('modal-confirm-btn');
  btn.className = action === 'delete' ? 'btn-danger' : action === 'suspend' ? 'btn-warning' : 'btn-primary';
  document.getElementById('action-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('action-modal').style.display = 'none';
  pendingAction = null; pendingUserId = null;
}

async function confirmAction() {
  if (!pendingUserId || !pendingAction) return;
  const note = document.getElementById('modal-note').value.trim();
  const r = await apiPost(`/api/dashboard/admin/users/${pendingUserId}/action/`, { action: pendingAction, note });
  if (r.ok) {
    showToast('Action completed successfully', 'success');
    closeModal();
    loadUsers(currentPage);
  } else {
    showToast(r.data?.error || 'Action failed', 'error');
  }
}

loadUsers();
</script>
{% endblock %}
