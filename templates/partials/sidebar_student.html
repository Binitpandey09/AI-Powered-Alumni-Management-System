{% with path=request.path %}

<a href="/dashboard/student/" data-tooltip="Dashboard" class="sidebar-link {% if '/dashboard/student' in path %}sidebar-active{% endif %}">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
  </svg>
  <span class="sidebar-label">Dashboard</span>
</a>

<a href="/feed/" data-tooltip="Feed" class="sidebar-link {% if '/feed' in path %}sidebar-active{% endif %}">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

  </svg>

<a href="/referrals/" data-tooltip="Referrals" class="sidebar-link {% if '/referrals' in path %}sidebar-active{% endif %}">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>

<a href="/sessions/" data-tooltip="Sessions" class="sidebar-link {% if '/sessions' in path %}sidebar-active{% endif %}">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
  <span class="sidebar-label">Sessions</span>
</a>

<span data-tooltip="Courses — Coming Soon" class="sidebar-link cursor-default opacity-60">
  <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

  </svg>
  <span class="sidebar-label">Courses <span class="soon-badge">Soon</span></span>
</span>

<a href="/tools/"
   class="sidebar-link {% if '/tools' in path %}sidebar-active{% endif %}"
   data-tooltip="AI Career Tools">

    <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
